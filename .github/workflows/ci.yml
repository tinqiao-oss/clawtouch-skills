name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List skill files
        run: |
          echo "Discovered SKILL.md files:"
          find skills -name SKILL.md -print | sort || echo "  (none found)"

      - name: Validate skill frontmatter (name / description / dir-name match)
        run: |
          python3 - <<'PY'
          import sys, pathlib
          skills = sorted(pathlib.Path("skills").glob("*/SKILL.md"))
          if not skills:
              print("::error::No skills/*/SKILL.md found — did the layout change?")
              sys.exit(1)
          errors = []
          for p in skills:
              text = p.read_text(encoding="utf-8")
              if not text.startswith("---"):
                  errors.append(f"{p}: missing YAML frontmatter (no leading ---)")
                  continue
              parts = text.split("---", 2)
              if len(parts) < 3:
                  errors.append(f"{p}: malformed frontmatter (need opening + closing ---)")
                  continue
              meta = {}
              for line in parts[1].splitlines():
                  if ":" in line and not line.lstrip().startswith("#"):
                      k, _, v = line.partition(":")
                      meta[k.strip()] = v.strip()
              name, desc = meta.get("name", ""), meta.get("description", "")
              dirname = p.parent.name
              if not name:
                  errors.append(f"{p}: frontmatter missing 'name'")
              if not desc:
                  errors.append(f"{p}: frontmatter missing 'description'")
              if name and name != dirname:
                  errors.append(f"{p}: frontmatter name '{name}' != directory '{dirname}'")
              print(f"  OK  {p}  (name={name or '?'})")
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print(f"\n{len(skills)} skill file(s) validated.")
          PY

      - name: Prohibited-term check (anti-detection / bypass / circumvent)
        run: |
          set -e
          mapfile -t skill_files < <(find skills -name SKILL.md)
          if [ ${#skill_files[@]} -eq 0 ]; then
            echo "No skill files to check"
            exit 0
          fi
          # Scan SKILL.md bodies only. README / CONTRIBUTING / SECURITY /
          # LICENSE / TRADEMARKS legitimately discuss these terms in a
          # "we DO NOT accept this" context and are intentionally excluded.
          if grep -i -n -E "anti.cheat|anti.detection|circumvent|bypass.*detection|反作弊|反检测" "${skill_files[@]}"; then
            echo "::error::Found prohibited terms in a skill file — see CONTRIBUTING.md"
            exit 1
          fi
          echo "OK — no prohibited terms in skill files"

      - name: keyboard shortcuts resolve against the MCP keycode vocabulary
        run: |
          python3 - <<'PY'
          import re, sys, pathlib
          # Vendored from clawtouch-mcp: protocol.MODIFIER_NAME_MAP keys +
          # keycodes._KEY_NAME_TO_HID names. Keep in sync if the MCP parser's
          # vocabulary changes. Guards the codex-round-3 "plus" bug class — a
          # SKILL.md shortcut the server can't resolve raises ValueError at
          # tools/call time and fails the agent step.
          MODIFIERS = {"ctrl", "control", "shift", "alt", "gui", "win", "cmd"}
          NAMED = {
              "enter", "return", "escape", "esc", "backspace", "delete", "tab",
              "space", "up", "down", "left", "right", "home", "end", "pageup",
              "pagedown", "insert", "plus", "equal", "equals", "minus", "hyphen",
              "dash", "comma", "period", "dot", "slash", "backslash", "semicolon",
              "apostrophe", "quote", "grave", "backtick", "tilde", "leftbracket",
              "rightbracket",
          } | {f"f{i}" for i in range(1, 13)}

          def resolves(shorthand: str) -> bool:
              # Mirrors server._tool_key: split modifier prefix only when every
              # "+"-separated head token is a known modifier; then the tail must
              # resolve via bridge.key_combo (named key, any case, or single char).
              key_str = shorthand
              if "+" in key_str and len(key_str) > 1:
                  parts = key_str.split("+")
                  head, tail = parts[:-1], parts[-1]
                  if tail and all(p.lower() in MODIFIERS for p in head):
                      key_str = tail
              return len(key_str) == 1 or key_str.lower() in NAMED

          def is_shortcut_combo(span: str) -> bool:
              # A backtick token that LOOKS like a keyboard shortcut:
              # "Mod+...+key" whose first segment is a known modifier. Excludes
              # spreadsheet ranges ("A1+A4"), formulas, and prose that merely
              # contains "+".
              if "+" not in span:
                  return False
              parts = span.split("+")
              return len(parts) >= 2 and parts[0].strip().lower() in MODIFIERS

          hidkey_pat = re.compile(r'hid\.key\(["\']([^"\']*)["\']\)')
          backtick_pat = re.compile(r'`([^`]+)`')
          errors = []
          for p in sorted(pathlib.Path("skills").glob("*/SKILL.md")):
              text = p.read_text(encoding="utf-8")
              # (1) explicit hid.key("...") shorthand must resolve.
              for m in hidkey_pat.finditer(text):
                  sc = m.group(1)
                  if not resolves(sc):
                      errors.append(
                          f'{p}: hid.key("{sc}") does not resolve '
                          f"(unknown key name or non-modifier prefix)"
                      )
              # (2) BARE prose shortcut combos (e.g. `Ctrl+PgDn`) must ALSO
              # resolve: an agent may echo the token verbatim into hid.key(),
              # so an unresolvable abbreviation (PgDn/PgUp/Del/Ins) would
              # ValueError at call time. This is the blind spot that let the
              # WPS `Ctrl+PgDn` mismatch slip past the hid.key()-only check —
              # write shortcuts as hid.key("ctrl+pagedown") with canonical
              # names, not abbreviations.
              for m in backtick_pat.finditer(text):
                  span = m.group(1).strip()
                  if "hid." in span:
                      continue  # actionable hid.key(...) calls handled by (1)
                  if is_shortcut_combo(span) and not resolves(span):
                      errors.append(
                          f'{p}: bare shortcut `{span}` is not resolvable by '
                          'the MCP keycode parser — write it as hid.key("...") '
                          "with canonical names (e.g. pagedown/pageup), not "
                          "abbreviations"
                      )
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print("OK — every hid.key(...) shorthand and bare shortcut combo "
                "resolves against the keycode vocabulary")
          PY

      - name: Broken relative-link sniff (SKILL.md only, non-blocking)
        continue-on-error: true
        run: |
          set +e
          find skills -name SKILL.md | while read -r f; do
            dir=$(dirname "$f")
            grep -hoE '\[[^]]+\]\(([^):]+\.md)[#)]' "$f" 2>/dev/null | \
              sed -E 's/.*\(([^):#]+)[#)].*/\1/' | sort -u | \
              while read -r link; do
                # resolve relative to the SKILL.md's own directory
                if [ -n "$link" ] && [ ! -f "$dir/$link" ] && [ ! -f "$link" ]; then
                  echo "::warning::$f: possibly broken relative link: $link"
                fi
              done
          done
          exit 0
